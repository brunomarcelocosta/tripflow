services:
  keycloak-db:
    image: postgres:16
    container_name: tripflow-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - tripflow-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: tripflow-keycloak
    restart: unless-stopped
    command:
      - start-dev
    volumes:
      - ./infra/keycloak/themes/tripflow:/opt/keycloak/themes/tripflow
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - tripflow-network

  tripflow-db:
    image: postgres:16
    container_name: tripflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tripflow
      POSTGRES_USER: tripflow
      POSTGRES_PASSWORD: tripflow_password
    ports:
      - "5434:5432"
    volumes:
      - tripflow_db_data:/var/lib/postgresql/data
    networks:
      - tripflow-network

volumes:
  keycloak_db_data:
  tripflow_db_data:

networks:
  tripflow-network:
    driver: bridge